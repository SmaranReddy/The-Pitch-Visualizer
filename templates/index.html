<!DOCTYPE html>

<html>

<head>

<title>Pitch Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Poppins",sans-serif;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
min-height:100vh;
overflow-x:hidden;
}

body::before,
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(150px);
z-index:-1;
}

body::before{
background:#6366f1;
top:-150px;
left:-150px;
}

body::after{
background:#06b6d4;
bottom:-150px;
right:-150px;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

h1{
font-size:56px;
font-weight:700;
letter-spacing:1px;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
margin-bottom:40px;
font-size:18px;
}

.input-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border-radius:16px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.08);
}

textarea{
width:100%;
height:160px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
padding:16px;
font-size:16px;
background:#020617;
color:white;
resize:none;
}

.controls{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

select{
padding:10px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:white;
}

button{
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
border:none;
padding:14px 28px;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
}

.storyboard-viewer{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
overflow:hidden;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.08);
max-width:720px;
width:100%;
display:none;
}

.panel.active{
display:block;
}

.panel img{
width:100%;
}

.caption{
padding:18px;
}

.panel-number{
opacity:0.6;
font-size:13px;
margin-bottom:5px;
}

.slide-controls{
margin-top:25px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.loader{
display:none;
margin-top:30px;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #6366f1;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container">

<h1>Pitch Visualizer</h1>
<p class="subtitle">Turn narratives into cinematic AI storyboards</p>

<form method="post" action="/generate" onsubmit="showLoader()">

<div class="input-card">

<textarea name="text" placeholder="Paste your startup narrative, product pitch, or story here..."></textarea>

<div class="controls">

<div>
<label>Visual Style</label>
<select name="style">
<option value="cinematic">Cinematic</option>
<option value="watercolor">Watercolor</option>
<option value="sketch">Sketch</option>
<option value="anime">Anime</option>
</select>
</div>

<button type="submit">Generate Storyboard</button>

</div>

</div>

</form>

<div class="loader" id="loader">
<div class="spinner"></div>
<p style="margin-top:10px;opacity:0.7;">Generating AI storyboard...</p>
</div>

{% if storyboard %}

<div class="storyboard-viewer">

{% for panel in storyboard %}

<div class="panel slide {% if loop.index == 1 %}active{% endif %}">

<img src="{{panel.image}}">

<div class="caption">
<div class="panel-number">Panel {{loop.index}}</div>
{{panel.caption}}
</div>

</div>

{% endfor %}

<div class="slide-controls">

<button id="prevBtn" onclick="prevSlide()">Previous</button>

<button id="playBtn" onclick="togglePlayback()">Play ▶</button>

<button id="nextBtn" onclick="nextSlide()">Next</button>

<button onclick="downloadPDF()">Download as PDF 📄</button>

</div>

{% endif %}

</div>

<script>

function showLoader(){
document.getElementById("loader").style.display="block";
}

let currentSlide = 0
let autoplay = false
let interval

function getSlides(){
return document.querySelectorAll(".slide")
}

function updateButtons(){

const slides = getSlides()

const prevBtn = document.getElementById("prevBtn")
const nextBtn = document.getElementById("nextBtn")

if(currentSlide === 0){
prevBtn.style.display="none"
}else{
prevBtn.style.display="inline-block"
}

if(currentSlide === slides.length-1){
nextBtn.style.display="none"
}else{
nextBtn.style.display="inline-block"
}

}

function showSlide(index){

const slides = getSlides()

slides.forEach(slide=>slide.classList.remove("active"))

slides[index].classList.add("active")

updateButtons()

}

function nextSlide(){

const slides = getSlides()

if(currentSlide < slides.length-1){
currentSlide++
showSlide(currentSlide)
}else{
stopPlayback()
}

}

function prevSlide(){

if(currentSlide>0){
currentSlide--
showSlide(currentSlide)
}

}

function togglePlayback(){

const playBtn=document.getElementById("playBtn")

if(!autoplay){

autoplay=true
playBtn.innerText="Pause ⏸"

interval=setInterval(()=>{
nextSlide()
},2000)

}else{

stopPlayback()

}

}

function stopPlayback(){

const playBtn=document.getElementById("playBtn")

autoplay=false
clearInterval(interval)

playBtn.innerText="Play ▶"

}

async function downloadPDF(){

const { jsPDF } = window.jspdf

const slides=getSlides()

const pdf=new jsPDF()

for(let i=0;i<slides.length;i++){

const img=slides[i].querySelector("img")
const caption=slides[i].querySelector(".caption").innerText

if(i>0) pdf.addPage()

pdf.addImage(img.src,"PNG",10,20,190,100)

pdf.setFontSize(12)
pdf.text(caption,10,140)

}

pdf.save("storyboard.pdf")

}

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){
nextSlide()
}

if(e.key==="ArrowLeft"){
prevSlide()
}

})

document.addEventListener("DOMContentLoaded",function(){
showSlide(currentSlide)
})

window.addEventListener("load",function(){
document.getElementById("loader").style.display="none"
})

</script>

</body>

</html>
