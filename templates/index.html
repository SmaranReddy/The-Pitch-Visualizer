<!DOCTYPE html>

<html>

<head>

<title>Pitch Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Poppins",sans-serif;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* glowing background blobs */

body::before,
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(150px);
z-index:-1;
}

body::before{
background:#6366f1;
top:-150px;
left:-150px;
}

body::after{
background:#06b6d4;
bottom:-150px;
right:-150px;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

/* TITLE */

h1{
font-size:56px;
font-weight:700;
letter-spacing:1px;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
margin-bottom:40px;
font-size:18px;
}

/* CARD */

.input-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border-radius:16px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.08);
}

/* TEXTAREA */

textarea{
width:100%;
height:160px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
padding:16px;
font-size:16px;
background:#020617;
color:white;
resize:none;
transition:0.3s;
}

textarea:focus{
outline:none;
border:1px solid #6366f1;
box-shadow:0 0 10px #6366f180;
}

textarea::placeholder{
color:#94a3b8;
}

/* CONTROLS */

.controls{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

select{
padding:10px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:white;
font-size:14px;
}

/* BUTTON */

button{
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
border:none;
padding:14px 28px;
border-radius:10px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 25px rgba(99,102,241,0.5);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(99,102,241,0.7);
}

/* STORYBOOK VIEWER */

.storyboard-viewer{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

/* PANEL */

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
overflow:hidden;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.08);
transition:0.4s;
max-width:720px;
width:100%;
display:none;
}

.panel.active{
display:block;
animation:fadeIn 0.5s ease;
}

.panel:hover{
transform:translateY(-8px);
box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

/* IMAGE */

.panel img{
width:100%;
display:block;
transition:0.5s;
}

.panel:hover img{
transform:scale(1.05);
}

/* CAPTION */

.caption{
padding:18px;
font-weight:500;
font-size:15px;
line-height:1.4;
opacity:0.9;
}

.panel-number{
opacity:0.6;
font-size:13px;
margin-bottom:5px;
}

/* NAVIGATION */

.slide-controls{
margin-top:25px;
display:flex;
gap:20px;
}

/* LOADING ANIMATION */

.loader{
display:none;
margin-top:30px;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #6366f1;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Pitch Visualizer</h1>
<p class="subtitle">Turn narratives into cinematic AI storyboards</p>

<form method="post" action="/generate" onsubmit="showLoader()">

<div class="input-card">

<textarea name="text" placeholder="Paste your startup narrative, product pitch, or story here..."></textarea>

<div class="controls">

<div>
<label>Visual Style</label>
<select name="style">
<option value="cinematic">Cinematic</option>
<option value="watercolor">Watercolor</option>
<option value="sketch">Sketch</option>
<option value="anime">Anime</option>
</select>
</div>

<button type="submit">Generate Storyboard</button>

</div>

</div>

</form>

<div class="loader" id="loader">
<div class="spinner"></div>
<p style="margin-top:10px;opacity:0.7;">Generating AI storyboard...</p>
</div>

{% if storyboard %}

<div class="storyboard-viewer">

{% for panel in storyboard %}

<div class="panel slide {% if loop.index == 1 %}active{% endif %}">

<img src="{{panel.image}}">

<div class="caption">
<div class="panel-number">Panel {{loop.index}}</div>
{{panel.caption}}
</div>

</div>

{% endfor %}

<div class="slide-controls">

<button id="prevBtn" onclick="prevSlide()">Previous</button>
<button id="nextBtn" onclick="nextSlide()">Next</button>

</div>

{% endif %}

</div>

<script>

function showLoader(){
document.getElementById("loader").style.display="block";
}

/* Story slide navigation */

let currentSlide = 0

function getSlides(){
return document.querySelectorAll(".slide")
}

function updateButtons(){

const slides = getSlides()

const prevBtn = document.getElementById("prevBtn")
const nextBtn = document.getElementById("nextBtn")

if(!prevBtn || !nextBtn) return

// Hide previous button on first slide
if(currentSlide === 0){
prevBtn.style.display = "none"
}else{
prevBtn.style.display = "inline-block"
}

// Hide next button on last slide
if(currentSlide === slides.length - 1){
nextBtn.style.display = "none"
}else{
nextBtn.style.display = "inline-block"
}

}

function showSlide(index){

const slides = getSlides()

if(slides.length === 0) return

slides.forEach(slide => slide.classList.remove("active"))

slides[index].classList.add("active")

updateButtons()

}

function nextSlide(){

const slides = getSlides()

if(slides.length === 0) return

if(currentSlide < slides.length - 1){
currentSlide++
showSlide(currentSlide)
}

}

function prevSlide(){

const slides = getSlides()

if(slides.length === 0) return

if(currentSlide > 0){
currentSlide--
showSlide(currentSlide)
}

}

/* Keyboard navigation */

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){
nextSlide()
}

if(e.key==="ArrowLeft"){
prevSlide()
}

})

/* Initialize slider */

document.addEventListener("DOMContentLoaded", function () {
showSlide(currentSlide)
})

/* Hide loader after page loads */

window.addEventListener("load", function(){
const loader = document.getElementById("loader")
if(loader) loader.style.display="none"
})

</script>

</body>

</html>
